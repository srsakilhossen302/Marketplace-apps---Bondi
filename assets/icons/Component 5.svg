<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <!-- Shopping Bag Icon -->
  <g fill="none" stroke="#C0D0FF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bag handle -->
    <path d="M24,28 C24,15 36,15 36,28" />
    <!-- Bag body -->
    <path d="M12,28 L15,64 C15,67 17,70 20,70 L40,70 C43,70 45,67 45,64 L48,28 Z" />
    <!-- Smile shape inside the bag -->
    <path d="M22,50 C26,57 34,57 38,50" fill="#C0D0FF" stroke="none" />
  </g>

  <!-- Bondi Text -->
  <text x="62" y="56" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="44" fill="#FFFFFF" letter-spacing="0.5">bond</text>
  <!-- Letter 'i' with cyan dot -->
  <text x="175" y="56" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="44" fill="#FFFFFF" letter-spacing="0.5">i</text>
  <circle cx="183" cy="22" r="5" fill="#00E5FF" />
</svg>
